name: Android APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutar la compilación manualmente en la pestaña Actions

jobs:
  build-android:
    name: Compilar APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar Dependencias NPM
        run: npm ci

      - name: Compilar React (Vite)
        run: npm run build
        
      - name: Sincronizar Capacitor (Android)
        run: npx cap sync android

      - name: Configurar permisos de Gradle
        run: chmod +x ./android/gradlew

      - name: Ensamblar APK Debug (Capacitor)
        run: cd android && ./gradlew assembleDebug

      - name: Subir APK como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: trainingOS-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
